<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nuvio TV Installer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="platforms" id="platforms">
      <button class="platform-button active" data-platform="samsung">
        <span>Samsung TV</span>
      </button>
      <button class="platform-button" data-platform="lg">
        <span>LG TV</span>
      </button>
    </section>

    <section class="panel">
      <div class="panel-header">
        <div>
          <h1 id="platform-title">Samsung TV</h1>
          <p id="platform-subtitle">Installa o aggiorna il pacchetto Tizen pubblicato nell'ultima release GitHub.</p>
        </div>
        <div class="header-controls">
          <label class="language-select">
            <span id="language-label">Lingua</span>
            <select id="language">
              <option value="it">Italiano</option>
              <option value="en">English</option>
            </select>
          </label>
          <span class="repo-pill" id="repo-pill">GitHub</span>
        </div>
      </div>

      <form id="installer-form" class="form-grid">
        <div class="guide-panel" id="guide-panel"></div>

        <label>
          <span id="ip-label">IP TV</span>
          <input id="ip" name="ip" placeholder="192.168.1.50" autocomplete="off" />
        </label>
        <label id="device-name-row" class="hidden">
          <span id="device-name-label">Nome device ares</span>
          <input id="deviceName" name="deviceName" placeholder="tv-lg-salone" autocomplete="off" />
        </label>
        <label id="lg-passphrase-row" class="hidden">
          <span id="lg-passphrase-label">Passphrase Developer Mode LG</span>
          <input id="lgPassphrase" name="lgPassphrase" type="password" autocomplete="off" />
        </label>
        <input id="packagePath" name="packagePath" type="hidden" value="" />

        <div class="actions">
          <button type="button" class="primary" data-action="install" id="install-button">Installa / Aggiorna</button>
          <button type="button" data-action="launch" id="launch-button">Avvia</button>
          <button type="button" class="danger" data-action="uninstall" id="uninstall-button">Disinstalla</button>
        </div>
      </form>

      <div class="requirements" id="requirements"></div>
    </section>

    <section class="log-panel">
      <div class="log-header">
        <h2 id="log-title">Log</h2>
        <button type="button" id="clear-log">Pulisci</button>
      </div>
      <pre id="log"></pre>
    </section>
  </main>

  <script src="renderer.js"></script>
</body>
</html>
